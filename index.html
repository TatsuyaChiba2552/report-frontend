<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ระบบแจ้งปัญหา</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

:root{

--bg1:#021b2b;
--bg2:#033b5c;

--card:rgba(255,255,255,0.08);

--text:#e0f7ff;
--sub:#9fd8ea;

--blue:#38bdf8;
--cyan:#22d3ee;
--green:#2dd4bf;
--red:#f87171;
--yellow:#facc15;

}

body{

background:
linear-gradient(
180deg,
var(--bg1),
var(--bg2)
);

min-height:100vh;

color:var(--text);

padding:20px;

overflow-x:hidden;

display:flex;
flex-direction:column;

}


/* เอฟเฟกต์ */

body::before{

content:"";

position:fixed;

width:200%;
height:200%;

top:-50%;
left:-50%;

background:

radial-gradient(
circle,
rgba(34,211,238,0.08),
transparent 60%
);

animation:
wave 12s linear infinite;

z-index:-1;

}

@keyframes wave{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}


/* =========================
   DESKTOP
========================= */

.main-layout{

display:flex;

gap:20px;

align-items:flex-start;

flex:1;

width:100%;

}

.container{

flex:1;

min-width:0;

}

.status-panel{

width:320px;

flex-shrink:0;

}


/* =========================
   MOBILE
========================= */

@media(max-width:768px){

body{

padding:10px;

}


/* เรียงลง */

.main-layout{

flex-direction:column;

gap:15px;

width:100%;

}


/* กล่องหลัก */

.container{

width:100%;

max-width:100%;

padding:18px;

}


/* สถานะแอดมิน */

.status-panel{

width:100%;

max-width:100%;

padding:18px;

}


/* ตารางเลื่อน */

table{

display:block;

overflow-x:auto;

white-space:nowrap;

}


/* หัวข้อ */

h1{

font-size:28px;

}

h2{

font-size:24px;

}


/* ปุ่ม */

button{

font-size:15px;

padding:13px;

}


/* การ์ดแอดมิน */

.admin-card{

padding:14px;

}


/* footer */

.footer{

margin-top:20px;

}

}


.container,
.status-panel{

background:var(--card);

backdrop-filter:blur(15px);

border:1px solid
rgba(255,255,255,0.1);

border-radius:25px;

box-shadow:
0 0 25px
rgba(34,211,238,0.15);

padding:25px;

}


h1,h2{

text-align:center;

margin-bottom:20px;

color:var(--cyan);

text-shadow:
0 0 10px
rgba(34,211,238,0.5);

}


button{

width:100%;

padding:14px;

border:none;

border-radius:15px;

margin-top:10px;

cursor:pointer;

font-size:16px;

font-weight:bold;

transition:0.25s;

color:white;

}


button:hover{

transform:
translateY(-2px)
scale(1.02);

filter:brightness(1.1);

}


.main-btn{

background:
linear-gradient(
90deg,
var(--blue),
var(--cyan)
);

box-shadow:
0 0 15px
rgba(34,211,238,0.4);

}


.accept-btn{

background:
linear-gradient(
90deg,
#10b981,
#2dd4bf
);

}


.delete-btn{

background:
linear-gradient(
90deg,
#ef4444,
#f87171
);

}


.teach-btn{

background:
linear-gradient(
90deg,
#eab308,
#fde047
);

color:#222;

}


input,
textarea{

width:100%;

padding:14px;

margin-top:10px;

border:none;

border-radius:15px;

background:
rgba(255,255,255,0.08);

color:var(--text);

outline:none;

font-size:15px;

border:1px solid
rgba(255,255,255,0.08);

}


input::placeholder,
textarea::placeholder{

color:var(--sub);

}


textarea{

height:120px;

resize:none;

}


.hidden{
display:none;
}


table{

width:100%;

border-collapse:collapse;

margin-top:20px;

overflow:hidden;

border-radius:20px;

}


th{

background:
rgba(34,211,238,0.2);

padding:14px;

color:var(--cyan);

}


td{

background:
rgba(255,255,255,0.05);

padding:12px;

text-align:center;

border-bottom:
1px solid
rgba(255,255,255,0.05);

}


.admin-card{

background:
rgba(255,255,255,0.05);

padding:15px;

border-radius:18px;

margin-bottom:12px;

border:1px solid
rgba(255,255,255,0.05);

box-shadow:
0 0 10px
rgba(34,211,238,0.1);

}


.track-box{

background:
rgba(255,255,255,0.06);

padding:25px;

border-radius:25px;

text-align:center;

font-size:24px;

font-weight:bold;

border:1px solid
rgba(255,255,255,0.08);

box-shadow:
0 0 20px
rgba(34,211,238,0.15);

}


#trackingStatus{

color:#67e8f9;

text-shadow:
0 0 12px
rgba(103,232,249,0.6);

}


/* FOOTER */

.footer{

margin-top:30px;

background:
rgba(255,255,255,0.05);

backdrop-filter:blur(15px);

border:
1px solid rgba(255,255,255,0.08);

border-radius:25px;

padding:20px;

box-shadow:
0 0 20px
rgba(34,211,238,0.1);

text-align:center;

}

html,
body{

max-width:100%;

overflow-x:hidden;

}


.footer-title{

font-size:22px;

font-weight:bold;

color:var(--cyan);

text-shadow:
0 0 10px
rgba(34,211,238,0.5);

}


.footer-sub{

margin-top:8px;

font-size:14px;

color:var(--sub);

letter-spacing:1px;

}


.footer-credit{

margin-top:12px;

font-size:13px;

color:#7dd3fc;

opacity:0.9;

}


/* MOBILE */

@media(max-width:768px){

body{
padding:12px;
}

.container,
.status-panel{

padding:18px;

border-radius:20px;

}

h1{
font-size:32px;
}

button{

padding:13px;

font-size:15px;

}

table{
font-size:13px;
}

td,th{
padding:8px;
}

}

</style>

</head>

<body>

<audio
id="notifySound"
preload="auto"
src="sounds/notify.mp3">
</audio>

<audio
id="waitingSound"
preload="auto"
loop
src="sounds/LowCortisol.mp3">
</audio>

<div class="main-layout">

<div class="container">

<!-- HOME -->

<div id="homePage">

<h1>🌊 ระบบแจ้งปัญหา</h1>

<button class="main-btn"
onclick="openUserPage()">
ผู้ใช้ทั่วไป
</button>

<button class="main-btn"
onclick="openAdminLogin()">
แอดมิน
</button>

</div>


<!-- USER -->

<div id="userPage"
class="hidden">

<h1>แจ้งปัญหา</h1>

<input type="text"
id="name"
placeholder="ชื่อผู้แจ้ง">

<input type="text"
id="room"
placeholder="เลขห้อง">

<textarea id="problem"
placeholder="รายละเอียดปัญหา"></textarea>

<button class="main-btn"
onclick="sendReport()">
ส่งแจ้งปัญหา
</button>

<button class="main-btn"
onclick="goHome()">
กลับหน้าแรก
</button>

</div>


<!-- TRACKING -->

<div id="trackingPage"
class="hidden">

<h1>สถานะงาน</h1>

<div class="track-box">

<div id="trackingStatus">
🟡 รอดำเนินการ
</div>

<div id="trackingWarning"
style="
margin-top:15px;
font-size:14px;
color:#fde68a;
opacity:0.9;
">

⚠️ อย่าพึ่งออกจากหน้านี้
จนกว่าจะมีแอดมินรับงาน

</div>

</div>

<button class="main-btn"
onclick="goHome()">
กลับหน้าแรก
</button>

</div>


<!-- LOGIN -->

<div id="adminLoginPage"
class="hidden">

<h1>เข้าสู่ระบบแอดมิน</h1>

<input type="password"
id="adminPassword"
placeholder="รหัสแอดมิน">

<button class="main-btn"
onclick="loginAdmin()">
เข้าสู่ระบบ
</button>

<button class="main-btn"
onclick="goHome()">
กลับหน้าแรก
</button>

<div id="loginError"></div>

</div>


<!-- ADMIN -->

<div id="adminPage"
class="hidden">

<h1>รายการแจ้งปัญหา</h1>

<button class="accept-btn"
onclick="changeMyStatus('🟢 ว่าง')">
🟢 ว่าง
</button>

<button class="delete-btn"
onclick="changeMyStatus('🔴 ไม่ว่าง')">
🔴 ไม่ว่าง
</button>

<button class="teach-btn"
onclick="changeMyStatus('🟡 สอนอยู่')">
🟡 สอนอยู่
</button>

<table>

<thead>

<tr>

<th>ผู้แจ้ง</th>
<th>ห้อง</th>
<th>ปัญหา</th>
<th>สถานะ</th>
<th>ผู้รับงาน</th>
<th>จัดการ</th>

</tr>

</thead>

<tbody id="reportTable"></tbody>

</table>

</div>

</div>


<!-- STATUS PANEL -->

<div class="status-panel">

<h2>สถานะแอดมิน</h2>

<div id="adminStatusList"></div>

</div>

</div>


<!-- FOOTER -->

<footer class="footer">

<div class="footer-title">
🌊 ระบบแจ้งปัญหา
</div>

<div class="footer-sub">
Realtime Support System
</div>

<div class="footer-credit">
Developed by TEERASAK KHAMIN
</div>

</footer>


<script>

const API_URL =
"https://report-system-88mg.onrender.com";

const admins = {

"1234":{
name:"Admin1"
},

"5678":{
name:"Admin2"
},

"2580":{
name:"นาย ธีรศักดิ์ คำอินทร์ (นักศึกษาฝึกงาน)"
},

"089":{
name:"นาย ชาคริต จันทร์ใหม่ (นักศึกษาฝึกงาน)"
},

"777":{
name:"นาย ณรงค์พล อินต๊ะคำ (นักศึกษาฝึกงาน)"
}

};

let reports = [];

let lastReportCount = 0;

let currentAdminPassword = null;

let myReportId = null;


// โหลดงาน

async function loadReports(){

const response =
await fetch(API_URL + "/reports");

reports =
await response.json();


// เสียงแจ้งเตือน

if(reports.length > lastReportCount){

if(
lastReportCount !== 0 &&
currentAdminPassword
){

document
.getElementById("notifySound")
.play();

}

}

lastReportCount =
reports.length;

renderReports();

updateTracking();

}


// โหลดแอดมิน

async function loadAdmins(){

const response =
await fetch(API_URL + "/admins");

const adminsData =
await response.json();

const list =
document.getElementById(
"adminStatusList"
);

list.innerHTML = "";

adminsData.forEach(admin=>{

list.innerHTML += `

<div class="admin-card">

<div>${admin.name}</div>

<div>${admin.status}</div>

<div style="font-size:12px;">
🕒 ${admin.lastOnline || "-"}
</div>

</div>

`;

});

}


// render งาน

function renderReports(){

const table =
document.getElementById(
"reportTable"
);

if(!table) return;

table.innerHTML = "";

reports.forEach((report,index)=>{

table.innerHTML += `

<tr>

<td>${report.name}</td>

<td>${report.room}</td>

<td>${report.problem}</td>

<td>${report.status}</td>

<td>${report.admin || "-"}</td>

<td>

<button
class="accept-btn"
onclick="acceptJob(${index})">
รับงาน
</button>

<button
class="delete-btn"
onclick="finishJob(${index})">
งานเสร็จ
</button>

</td>

</tr>

`;

});

}


// Tracking

function updateTracking(){

const trackingStatus =
document.getElementById(
"trackingStatus"
);

if(!trackingStatus) return;

const warning =
document.getElementById(
"trackingWarning"
);

const waitingSound =
document.getElementById(
"waitingSound"
);


if(!myReportId){

trackingStatus.innerHTML =
"ไม่มีงาน";

if(warning)
warning.style.display =
"none";

waitingSound.pause();

waitingSound.currentTime = 0;

return;

}


const report =
reports.find(
r=>r.id == myReportId
);


if(!report){

trackingStatus.innerHTML =
"✅ งานเสร็จแล้ว";

if(warning)
warning.style.display =
"none";

waitingSound.pause();

waitingSound.currentTime = 0;

return;

}


trackingStatus.innerHTML =
report.status;


// ถ้ายังรอ

if(report.status.includes("รอดำเนินการ")){

if(warning){

warning.style.display =
"block";

}

waitingSound.play();

}else{

if(warning){

warning.style.display =
"none";

}

waitingSound.pause();

waitingSound.currentTime = 0;

}

}


// ซ่อนหน้า

function hideAllPages(){

document.querySelectorAll(
"#homePage,#userPage,#trackingPage,#adminLoginPage,#adminPage"
).forEach(el=>{

el.classList.add("hidden");

});

}


// หน้าแรก

function goHome(){

const waitingSound =
document.getElementById(
"waitingSound"
);

waitingSound.pause();

waitingSound.currentTime = 0;

hideAllPages();

document
.getElementById("homePage")
.classList.remove("hidden");

}


// USER PAGE

function openUserPage(){

hideAllPages();

document
.getElementById("userPage")
.classList.remove("hidden");

}


// TRACKING PAGE

function openTracking(){

hideAllPages();

document
.getElementById("trackingPage")
.classList.remove("hidden");

const waitingSound =
document.getElementById(
"waitingSound"
);

waitingSound.volume = 0.3;

waitingSound.play();

updateTracking();

}


// ADMIN LOGIN

function openAdminLogin(){

hideAllPages();

document
.getElementById("adminLoginPage")
.classList.remove("hidden");

}


// LOGIN

function loginAdmin(){

const password =
document.getElementById(
"adminPassword"
).value;

if(admins[password]){

currentAdminPassword =
password;

hideAllPages();

document
.getElementById("adminPage")
.classList.remove("hidden");

}else{

document
.getElementById("loginError")
.innerText =
"รหัสไม่ถูกต้อง";

}

}


// ส่งแจ้ง

async function sendReport(){

const name =
document.getElementById("name").value;

const room =
document.getElementById("room").value;

const problem =
document.getElementById("problem").value;

if(!name || !room || !problem){

alert("กรอกข้อมูลให้ครบ");

return;

}


const response =
await fetch(API_URL + "/report",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name,
room,
problem
})

});


const data =
await response.json();

myReportId =
data.id;


document.getElementById("name").value="";
document.getElementById("room").value="";
document.getElementById("problem").value="";


await loadReports();

openTracking();

}


// รับงาน

async function acceptJob(index){

const report =
reports[index];

await fetch(API_URL + "/accept",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

id:report.id,

admin:
admins[currentAdminPassword]
.name

})

});

loadReports();

loadAdmins();

}


// งานเสร็จ

async function finishJob(index){

const report =
reports[index];

await fetch(API_URL + "/finish",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

id:report.id,

admin:
admins[currentAdminPassword]
.name

})

});

loadReports();

loadAdmins();

}


// เปลี่ยนสถานะ

async function changeMyStatus(status){

await fetch(API_URL + "/admin-status",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:
admins[currentAdminPassword]
.name,

status

})

});

loadAdmins();

}


// REALTIME

setInterval(()=>{

loadReports();

loadAdmins();

},3000);


loadReports();

loadAdmins();

</script>

</body>
</html>
