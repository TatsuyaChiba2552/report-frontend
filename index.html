<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ระบบแจ้งปัญหา</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.main-layout{
display:flex;
gap:20px;
align-items:flex-start;
}

@media(max-width:768px){

.main-layout{
flex-direction:column;
}

}

.container{
flex:1;
background:#1e293b;
padding:25px;
border-radius:20px;
}

.status-panel{
width:300px;
background:#1e293b;
padding:20px;
border-radius:20px;
}

@media(max-width:768px){

.status-panel{
width:100%;
}

}

h1,h2{
margin-bottom:20px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-top:10px;
cursor:pointer;
color:white;
font-size:16px;
}

.main-btn{
background:#0ea5e9;
}

.accept-btn{
background:#22c55e;
}

.delete-btn{
background:#ef4444;
}

.teach-btn{
background:#eab308;
}

input, textarea{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
background:#334155;
color:white;
}

textarea{
height:120px;
resize:none;
}

.hidden{
display:none;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #475569;
padding:12px;
text-align:center;
}

td{
background:#334155;
}

.admin-card{
background:#334155;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

.track-box{
background:#334155;
padding:20px;
border-radius:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="main-layout">

<div class="container">

<!-- หน้าแรก -->
<div id="homePage">

<h1>ระบบแจ้งปัญหา</h1>

<button class="main-btn"
onclick="openUserPage()">
ผู้ใช้ทั่วไป
</button>

<button class="main-btn"
onclick="openAdminLogin()">
แอดมิน
</button>

</div>


<!-- หน้าแจ้ง -->
<div id="userPage"
class="hidden">

<h1>แจ้งปัญหา</h1>

<input type="text"
id="name"
placeholder="ชื่อผู้แจ้ง">

<input type="text"
id="room"
placeholder="เลขห้อง">

<textarea id="problem"
placeholder="รายละเอียดปัญหา"></textarea>

<button class="main-btn"
onclick="sendReport()">
ส่งแจ้งปัญหา
</button>

<button class="main-btn"
onclick="goHome()">
กลับหน้าแรก
</button>

</div>


<!-- Tracking -->
<div id="trackingPage"
class="hidden">

<h1>สถานะงาน</h1>

<div class="track-box">

<div id="trackingStatus">
🟡 รอดำเนินการ
</div>

<div id="trackingAdmin"></div>

</div>

<button class="main-btn"
onclick="goHome()">
กลับหน้าแรก
</button>

</div>


<!-- Login -->
<div id="adminLoginPage"
class="hidden">

<h1>เข้าสู่ระบบแอดมิน</h1>

<input type="password"
id="adminPassword"
placeholder="รหัสแอดมิน">

<button class="main-btn"
onclick="loginAdmin()">
เข้าสู่ระบบ
</button>

<button class="main-btn"
onclick="goHome()">
กลับหน้าแรก
</button>

<div id="loginError"></div>

</div>


<!-- Admin -->
<div id="adminPage"
class="hidden">

<h1>รายการแจ้งปัญหา</h1>

<button class="accept-btn"
onclick="changeMyStatus('🟢 ว่าง')">
🟢 ว่าง
</button>

<button class="delete-btn"
onclick="changeMyStatus('🔴 ไม่ว่าง')">
🔴 ไม่ว่าง
</button>

<button class="teach-btn"
onclick="changeMyStatus('🟡 สอนอยู่')">
🟡 สอนอยู่
</button>

<table>

<thead>

<tr>

<th>ผู้แจ้ง</th>
<th>ห้อง</th>
<th>ปัญหา</th>
<th>สถานะ</th>
<th>ผู้รับงาน</th>
<th>จัดการ</th>

</tr>

</thead>

<tbody id="reportTable"></tbody>

</table>

</div>

</div>


<!-- สถานะแอดมิน -->
<div class="status-panel">

<h2>สถานะแอดมิน</h2>

<div id="adminStatusList"></div>

</div>

</div>


<script>

const API_URL =
"https://report-system-88mg.onrender.com";


const admins = {

"1234":{
name:"Admin1"
},

"5678":{
name:"Admin2"
},

"9999":{
name:"Admin3"
},

"0000":{
name:"Admin4"
}

};


let reports = [];

let currentAdminPassword = null;


// โหลดงาน
async function loadReports(){

const response =
await fetch(API_URL + "/reports");

reports =
await response.json();

renderReports();

updateTracking();

}


// โหลดแอดมิน
async function loadAdmins(){

const response =
await fetch(API_URL + "/admins");

const adminsData =
await response.json();

const list =
document.getElementById(
"adminStatusList"
);

list.innerHTML = "";

adminsData.forEach(admin=>{

list.innerHTML += `

<div class="admin-card">

<div>${admin.name}</div>

<div>${admin.status}</div>

<div style="font-size:12px;">
🕒 ${admin.lastOnline || "-"}
</div>

</div>

`;

});

}


// render งาน
function renderReports(){

const table =
document.getElementById(
"reportTable"
);

table.innerHTML = "";

reports.forEach((report,index)=>{

table.innerHTML += `

<tr>

<td>${report.name}</td>

<td>${report.room}</td>

<td>${report.problem}</td>

<td>${report.status}</td>

<td>${report.admin || "-"}</td>

<td>

<button
class="accept-btn"
onclick="acceptJob(${index})">
รับงาน
</button>

<button
class="delete-btn"
onclick="finishJob(${index})">
งานเสร็จ
</button>

</td>

</tr>

`;

});

}


// Tracking
function updateTracking(){

const trackingStatus =
document.getElementById(
"trackingStatus"
);

const trackingAdmin =
document.getElementById(
"trackingAdmin"
);

if(reports.length <= 0){

trackingStatus.innerHTML =
"ไม่มีงาน";

trackingAdmin.innerHTML = "";

return;

}


// งานล่าสุด
const report =
reports[reports.length - 1];

trackingStatus.innerHTML =
report.status;

trackingAdmin.innerHTML =
report.admin
? "👨‍🔧 " +
report.admin
: "";

}


// ซ่อนหน้า
function hideAllPages(){

document.querySelectorAll(
"#homePage,#userPage,#trackingPage,#adminLoginPage,#adminPage"
).forEach(el=>{

el.classList.add("hidden");

});

}


// หน้าแรก
function goHome(){

hideAllPages();

document
.getElementById("homePage")
.classList.remove("hidden");

}


// ผู้ใช้
function openUserPage(){

hideAllPages();

document
.getElementById("userPage")
.classList.remove("hidden");

}


// Tracking
function openTracking(){

hideAllPages();

document
.getElementById("trackingPage")
.classList.remove("hidden");

updateTracking();

}


// Login
function openAdminLogin(){

hideAllPages();

document
.getElementById("adminLoginPage")
.classList.remove("hidden");

}


// Login
function loginAdmin(){

const password =
document.getElementById(
"adminPassword"
).value;

if(admins[password]){

currentAdminPassword =
password;

hideAllPages();

document
.getElementById("adminPage")
.classList.remove("hidden");

}else{

document
.getElementById("loginError")
.innerText =
"รหัสไม่ถูกต้อง";

}

}


// ส่งแจ้ง
async function sendReport(){

const name =
document.getElementById("name").value;

const room =
document.getElementById("room").value;

const problem =
document.getElementById("problem").value;

if(!name || !room || !problem){

alert("กรอกข้อมูลให้ครบ");

return;

}


await fetch(API_URL + "/report",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name,
room,
problem

})

});


document.getElementById("name").value="";
document.getElementById("room").value="";
document.getElementById("problem").value="";


await loadReports();

openTracking();

}


// รับงาน
async function acceptJob(index){

const report =
reports[index];

await fetch(API_URL + "/accept",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

id:report.id,

admin:
admins[currentAdminPassword]
.name

})

});

loadReports();

loadAdmins();

}


// งานเสร็จ
async function finishJob(index){

const report =
reports[index];

await fetch(API_URL + "/finish",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

id:report.id,

admin:
admins[currentAdminPassword]
.name

})

});

loadReports();

loadAdmins();

}


// เปลี่ยนสถานะ
async function changeMyStatus(status){

await fetch(API_URL + "/admin-status",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:
admins[currentAdminPassword]
.name,

status

})

});

loadAdmins();

}


// realtime
setInterval(()=>{

loadReports();

loadAdmins();

},5000);


loadReports();

loadAdmins();

</script>

</body>
</html>
